name: 构建 EXE

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install pyinstaller pynacl requests

      - name: 打包 EXE
        run: pyinstaller --onefile --windowed --name "成绩监控" --add-data "monitor.py;." --add-data "requirements.txt;." app.py

      - name: 上传 EXE
        uses: actions/upload-artifact@v4
        with:
          name: 成绩监控
          path: dist/成绩监控.exe

      - name: 创建 Release
        if: github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.0
          name: "成绩监控 v2.0"
          files: dist/成绩监控.exe
          body: |
            双击运行，输入学号密码和 WxPusher Token/UID，点击一键配置即可。

            之后每2小时自动查成绩，变化推送到手机。电脑关机不受影响。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
