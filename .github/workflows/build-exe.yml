name: 构建 EXE

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install pyinstaller pynacl requests

      - name: 打包 EXE
        run: pyinstaller --onefile --windowed --name "成绩监控" --add-data "monitor.py;." --add-data "requirements.txt;." app.py

      - name: 上传 EXE
        uses: actions/upload-artifact@v4
        with:
          name: 成绩监控
          path: dist/成绩监控.exe

      - name: 上传 Release
        run: |
          gh release create v2.0 dist/成绩监控.exe --title "成绩监控 v2.0" --notes "双击运行，输入学号密码和WxPusher信息即可一键配置。之后每2小时自动检查成绩。" --clobber
        env:
          GH_TOKEN: ${{ github.token }}
